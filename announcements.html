<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    Dnmx — Clan Headquarters
  </title>
  <link rel="icon" type="image/png" href="assets/Dnmx.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;family=Orbitron:wght@400;500;600;700;800;900&amp;display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- LOADING SCREEN -->
  <div id="loader">
    <div class="loader-logo">
      DNMX
    </div>
    <div class="loader-bar-wrap">
      <div class="loader-bar">
      </div>
    </div>
    <div class="loader-text">
      INITIALIZING COMMAND CENTER
    </div>
  </div>
  <!-- NAV -->
  <nav>
    <div class="nav-logo" onclick="navigate('home')">
      DNMX
    </div>
    <ul class="nav-links">
      <li>
        <a href="#" class="nav-link" data-page="home"> HOME
        </a>
      </li>
      <li>
        <a href="#" class="nav-link" data-page="hierarchy"> HIERARCHY
        </a>
      </li>
      <li>
        <a href="#" class="nav-link" data-page="rules"> RULES
        </a>
      </li>
      <li>
        <a href="#" class="nav-link" data-page="councils"> COUNCILS
        </a>
      </li>
      <li>
        <a href="#" class="nav-link" data-page="tasks"> TASKS
        </a>
      </li>
      <li>
        <a href="#" class="nav-link active" data-page="announcements"> ANNOUNCEMENTS
        </a>
      </li>
      <li>
        <a href="#" class="nav-link" data-page="memories"> MEMORIES
        </a>
      </li>
    </ul>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn-secondary" id="chatToggleButton" onclick="window.toggleChatPanel()" style="display: none;">
        CHAT
      </button>
      <div id="authArea">
        <button class="btn-secondary" id="authButton" onclick="window.openLoginModal()">
          LOG IN
        </button>
      </div>
      <div class="hamburger" id="hamburger" onclick="toggleMobile()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>
  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#" class="mobile-nav-link" data-page="home"> HOME
    </a>
    <a href="#" class="mobile-nav-link" data-page="hierarchy"> HIERARCHY
    </a>
    <a href="#" class="mobile-nav-link" data-page="rules"> RULES
    </a>
    <a href="#" class="mobile-nav-link" data-page="councils"> COUNCILS
    </a>
    <a href="#" class="mobile-nav-link" data-page="tasks"> TASKS
    </a>
    <a href="#" class="mobile-nav-link active" data-page="announcements"> ANNOUNCEMENTS
    </a>
    <a href="#" class="mobile-nav-link" data-page="memories"> MEMORIES
    </a>
    <div id="mobileAuthArea"
      style="margin-top: 10px; padding: 10px 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px;">
    </div>
  </div>
  <main>
    <section id="announcements-page" class="page active">
      <div class="page-hero">
        <div class="page-hero-bg">
        </div>
        <div class="page-hero-grid">
        </div>
        <div class="page-hero-content">
          <div class="page-hero-tag">
            OFFICIAL DECREES
          </div>
          <h1 class="page-hero-title">
            Announcements
          </h1>
          <p class="page-hero-subtitle">
            Dispatches from the Command Center
          </p>
        </div>
      </div>
      <div class="announcements-section">
        <div class="announce-controls">
          <div class="search-wrap">
            <span class="search-icon"> 🔍
            </span>
            <input type="text" id="announceSearch" placeholder="Search announcements..."
              oninput="filterAnnouncements()" />
          </div>
          <div class="filter-chips" id="announceFilters">
            <button class="chip active" data-filter="all" onclick="setAnnounceFilter('all', this)">
              ALL
            </button>
            <button class="chip" data-filter="update" onclick="setAnnounceFilter('update', this)">
              UPDATES
            </button>
            <button class="chip" data-filter="event" onclick="setAnnounceFilter('event', this)">
              EVENTS
            </button>
            <button class="chip" data-filter="alert" onclick="setAnnounceFilter('alert', this)">
              ALERTS
            </button>
            <button class="chip" data-filter="recruit" onclick="setAnnounceFilter('recruit', this)">
              RECRUITMENT
            </button>
            <button class="chip" data-filter="decree" onclick="setAnnounceFilter('decree', this)">
              DECREES
            </button>
          </div>
        </div>
        <div class="announce-grid" id="announceGrid">
        </div>
        <button type="button" id="adminAnnounceBtn" class="btn-primary assign-task-btn" onclick="openNewAnnouncementModal()" style="display:none;">
          <span> NEW ANNOUNCEMENT </span>
        </button>
      </div>
    </section>
    <!-- CHAT PANEL -->

  </main>
  <!-- CHAT PANEL (body-level so position:fixed works on all pages) -->
  <div id="chatPanel" class="chat-panel">
    <!-- User List View -->
    <div id="chatUserListContainer" class="chat-view-container">
      <div class="chat-header">
        <h3 class="chat-title">MEMBERS CHAT</h3>
        <button class="chat-close-btn" onclick="window.toggleChatPanel()" aria-label="Close chat">✕</button>
      </div>
      <div class="chat-user-list" id="chatUserList">
        <!-- Users populated dynamically -->
      </div>
    </div>
    <!-- Chat Room View -->
    <div id="chatRoomContainer" class="chat-view-container" style="display: none;">
      <div class="chat-header">
        <button class="chat-back-btn" onclick="window.goBackToUserList()" aria-label="Go back">←</button>
        <div class="chat-header-info">
          <h4 id="chatRoomHeaderName" class="chat-active-username">Username</h4>
          <div id="chatRoomHeaderStatus" class="chat-active-status">Online</div>
        </div>
        <button class="chat-close-btn" onclick="window.toggleChatPanel()" aria-label="Close chat">✕</button>
      </div>
      <div class="chat-messages" id="chatMessagesBody">
        <!-- Messages populated dynamically -->
      </div>
      <div id="chatTypingIndicator" class="chat-typing-indicator" style="display: none;">
        <span id="chatTypingText"></span>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
      <div id="chatMediaPreview" class="chat-media-preview" style="display: none;">
        <img id="chatMediaPreviewImg" src="" alt="Media preview" />
        <button class="remove-preview-btn" onclick="window.removeChatMedia()">✕</button>
      </div>
      <div class="chat-input-area">
        <textarea id="chatMessageInput" placeholder="Write a message..." rows="1"
          onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); window.sendChatMessage(); }"
          oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; window.handleTypingInput();"></textarea>
        <button class="btn-primary chat-send-btn" onclick="window.sendChatMessage()"><span>SEND</span></button>
      </div>
    </div>
  </div>

  <!-- MODAL (body-level so it overlays everything correctly) -->
  <div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()" aria-label="Close modal">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- FIREBASE -->
  <script type="module" src="script.js"></script>
</body>

</html>
